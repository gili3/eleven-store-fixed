name: eleven_store
description: Eleven Store Mobile Application built with Flutter and Firebase.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  google_sign_in: ^6.2.1

  # UI & Utilities
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  intl: ^0.19.0
  provider: ^6.1.2
  cached_network_image: ^3.3.1
  carousel_slider: ^5.0.0
  flutter_spinkit: ^5.2.1
  font_awesome_flutter: ^10.7.0
  image_picker: ^1.1.2
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.0
  share_plus: ^7.2.1
  shimmer: ^3.0.0
  badges: ^3.1.2
  top_snackbar_flutter: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
